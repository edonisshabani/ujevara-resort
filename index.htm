<!doctype html>
<html lang="sq">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Ujevara Resort - Menu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Pacifico&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css?v=6" />
  </head>
  <body>
    <main class="menu-app">
      <header class="menu-hero">
        <div class="menu-hero-card">
          <p class="menu-subtitle" data-i18n="resortName">Ujevara Resort</p>
          <h1 class="menu-title" data-i18n="menuTitle">Menu</h1>
          <div class="menu-hero-nav">
            <div class="lang-toggle" role="group" aria-label="Language toggle">
              <button class="lang-button active" data-lang="sq">SQ</button>
              <span class="lang-divider" aria-hidden="true">|</span>
              <button class="lang-button" data-lang="en">EN</button>
            </div>
            <div class="tabs" role="tablist" aria-label="Menu category">
              <button class="tab-button active" id="tab-drinks" data-tab="drinks" role="tab" aria-selected="true">Pije</button>
              <button class="tab-button" id="tab-food" data-tab="food" role="tab" aria-selected="false">Ushqim</button>
            </div>
          </div>
        </div>
      </header>
      <div class="menu-content" id="menu-content">
        <section class="menu-panel active" id="panel-drinks" role="tabpanel" aria-labelledby="tab-drinks"></section>
        <section class="menu-panel" id="panel-food" role="tabpanel" aria-labelledby="tab-food"></section>
      </div>
    </main>
    <script src="script.js?v=6"></script>
  </body>
</html>
