<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ujevara Resort - Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Pacifico&display=swap" rel="stylesheet">
<style>
:root{--primary:#214783;--primary-light:#2f5a9e;--cream:#f4f7fb;--green:#1a3055;--green-soft:#5a7299;--border:rgba(33,71,131,.16);--shadow:0 8px 24px rgba(33,71,131,.1);--app-width:min(980px,100%);--stripe-size:44px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#e8edf4;font-family:Montserrat,sans-serif;color:var(--green);display:flex;justify-content:center;padding:1rem}
.menu-app{width:var(--app-width);min-height:100vh;background:var(--cream);box-shadow:var(--shadow);overflow-x:hidden}
.menu-hero{min-height:52vh;display:flex;align-items:center;justify-content:center;padding:2.5rem 1.5rem 2rem;background:repeating-linear-gradient(90deg,var(--primary) 0,var(--primary) var(--stripe-size),var(--cream) var(--stripe-size),var(--cream) calc(var(--stripe-size)*2));border-bottom:6px solid #fff}
.menu-hero-card{width:min(100%,24rem);padding:2.25rem 2rem 1.85rem;text-align:center;background:rgba(255,255,255,.98);border:1px solid rgba(255,255,255,.85);border-radius:22px;box-shadow:0 16px 48px rgba(26,48,85,.22)}
.menu-subtitle{font-size:clamp(.78rem,2.8vw,.92rem);font-weight:700;letter-spacing:.34em;text-transform:uppercase;color:var(--primary-light)}
.menu-title{margin:.35rem 0 0;font-family:Pacifico,cursive;font-size:clamp(3.2rem,13vw,4.6rem);font-weight:400;line-height:1.15;color:var(--primary)}
.menu-hero-nav{display:flex;flex-direction:column;align-items:center;gap:1.25rem;width:100%;margin-top:1.35rem}
.tabs{display:flex;justify-content:center;gap:2rem;width:100%}
.tab-button{border:0;background:transparent;color:var(--green-soft);padding:.45rem 0;font:inherit;font-size:1.05rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;border-bottom:3px solid transparent}
.tab-button.active{color:var(--primary);border-bottom-color:var(--primary)}
.lang-toggle{display:inline-flex;align-items:center;gap:.15rem;padding:.3rem;border-radius:999px;background:var(--cream);border:1px solid var(--border)}
.lang-divider{color:var(--border);font-size:.85rem}
.lang-button{border:0;background:transparent;color:var(--green-soft);padding:.4rem .9rem;font:inherit;font-size:.82rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;border-radius:999px}
.lang-button.active{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(33,71,131,.28)}
.menu-content{padding-bottom:2.5rem;background:var(--cream)}
.menu-panel{display:none;padding:2rem 2.25rem 2.5rem}
.menu-panel.active{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:2.5rem}
.menu-column{display:flex;flex-direction:column;gap:2.25rem}
.menu-group h2{margin:0 0 1rem;color:var(--green);font-size:1.35rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.menu-group ul{list-style:none;display:flex;flex-direction:column;gap:.85rem}
.item-row{display:grid;grid-template-columns:auto 1fr auto;align-items:baseline;gap:.65rem;font-size:1rem;line-height:1.55}
.item-dots{border-bottom:1px solid var(--border);transform:translateY(-1px)}
.item-price{font-weight:600}
@media(max-width:760px){body{padding:0}.menu-hero{min-height:48vh;padding:2rem 1rem 1.75rem}.menu-panel{padding:1.5rem}.menu-panel.active{grid-template-columns:1fr;gap:2rem}}
</style>
</head>
<body>
<main class="menu-app">
<header class="menu-hero">
<div class="menu-hero-card">
<p class="menu-subtitle" data-i18n="resortName">Ujevara Resort</p>
<h1 class="menu-title" data-i18n="menuTitle">Menu</h1>
<div class="menu-hero-nav">
<div class="lang-toggle"><button class="lang-button active" data-lang="sq">SQ</button><span class="lang-divider">|</span><button class="lang-button" data-lang="en">EN</button></div>
<div class="tabs"><button class="tab-button active" id="tab-drinks" data-tab="drinks">Pije</button><button class="tab-button" id="tab-food" data-tab="food">Ushqim</button></div>
</div>
</div>
</header>
<div class="menu-content">
<section class="menu-panel active" id="panel-drinks"></section>
<section class="menu-panel" id="panel-food"></section>
</div>
</main>
<script>
var state={tab:"drinks",lang:"sq"};
var i18n={en:{resortName:"Ujevara Resort",menuTitle:"Menu",drinksTab:"Drinks",foodTab:"Food"},sq:{resortName:"Ujevara Resort",menuTitle:"Menu",drinksTab:"Pije",foodTab:"Ushqim"}};
var menuData={drinks:{en:[{title:"Soft Drinks",items:[["Water","1 EUR"],["Sodas","1.5 EUR"],["Juices","1.5 EUR"],["Iced Coffee","2 EUR"],["Red Bull","3.5 EUR"]]},{title:"Beers",items:[["Peja","2 EUR"],["Lasko","2 EUR"],["Tuborg","3 EUR"],["Heineken","3 EUR"],["Corona","4 EUR"]]},{title:"Glasses",items:[["Tequila Shot","3 EUR"],["Jagermeister","3.5 EUR"],["Smirnoff Ice","3.5 EUR"],["Jack Daniels","4 EUR"],["Gin and Tonic","4.5 EUR"],["Vodka Cranberry","4.5 EUR"],["Vodka Orange","4.5 EUR"]]}],sq:[{title:"Pije jo-alkoolike",items:[["Uje","1 EUR"],["Pije te gazuara","1.5 EUR"],["Lenge frutash","1.5 EUR"],["Kafe e ftohte","2 EUR"],["Red Bull","3.5 EUR"]]},{title:"Birrat",items:[["Peja","2 EUR"],["Lasko","2 EUR"],["Tuborg","3 EUR"],["Heineken","3 EUR"],["Corona","4 EUR"]]},{title:"Gotat",items:[["Tequila Shot","3 EUR"],["Jagermeister","3.5 EUR"],["Smirnoff Ice","3.5 EUR"],["Jack Daniels","4 EUR"],["Gin and Tonic","4.5 EUR"],["Vodka Cranberry","4.5 EUR"],["Vodka Orange","4.5 EUR"]]}]},food:{en:[{title:"Breakfast",items:[["Llokuma","3.5 EUR"]]},{title:"Salads",items:[["Greek Salad","3.5 EUR"],["Mixed Salad","3.5 EUR"],["Chicken Salad","6.5 EUR"]]},{title:"Main Dishes",items:[["Chicken Thigh","6.5 EUR"],["Grilled Shrimp","10 EUR"],["Salmon","13.5 EUR"],["Seafood Pasta","7.5 EUR"],["Shrimp Pasta","7.5 EUR"],["Burger","3 EUR"]]},{title:"Pizzas",items:[["Margherita Pizza","4.5 EUR"],["Prosciutto Pizza","5.5 EUR"],["Two Seasons Pizza","5.5 EUR"],["Tuna Pizza","5.5 EUR"],["Vegetarian Pizza","5.5 EUR"],["Ujevara Pizza","6.5 EUR"]]},{title:"Sandwiches",items:[["Prosciutto Sandwich","3 EUR"],["Chicken Sandwich","3 EUR"],["Mozzarella Sandwich","3 EUR"]]}],sq:[{title:"Mengjesi",items:[["Llokuma","3.5 EUR"]]},{title:"Sallatat",items:[["Sallate greke","3.5 EUR"],["Sallate mikse","3.5 EUR"],["Sallate pule","6.5 EUR"]]},{title:"Pjatat kryesore",items:[["Gioks pule","6.5 EUR"],["Karkaleca zgare","10 EUR"],["Salmon","13.5 EUR"],["Pasta me fruta deti","7.5 EUR"],["Pasta me karkaleca","7.5 EUR"],["Burger","3 EUR"]]},{title:"Picat",items:[["Pizza margarita","4.5 EUR"],["Pizza proshute","5.5 EUR"],["Pizza dy stineshe","5.5 EUR"],["Pizza tuna","5.5 EUR"],["Pizza vegjetariane","5.5 EUR"],["Pizza Ujevara","6.5 EUR"]]},{title:"Sandwich",items:[["Sandwich proshute","3 EUR"],["Sandwich pule","3 EUR"],["Sandwich mozzarella","3 EUR"]]}]}};
var panelDrinks=document.getElementById("panel-drinks"),panelFood=document.getElementById("panel-food"),tabButtons=[].slice.call(document.querySelectorAll(".tab-button")),langButtons=[].slice.call(document.querySelectorAll(".lang-button"));
function twoColumns(g){var s=Math.ceil(g.length/2);return[g.slice(0,s),g.slice(s)]}
function itemMarkup(i){return'<li class="item-row"><span class="item-label">'+i[0]+'</span><span class="item-dots"></span><span class="item-price">'+i[1]+'</span></li>'}
function groupMarkup(g){return'<article class="menu-group"><h2>'+g.title+'</h2><ul>'+g.items.map(itemMarkup).join("")+'</ul></article>'}
function renderPanel(t,g){var c=twoColumns(g);t.innerHTML='<div class="menu-column">'+c[0].map(groupMarkup).join("")+'</div><div class="menu-column">'+c[1].map(groupMarkup).join("")+'</div>'}
function updateLanguageText(){var l=i18n[state.lang];document.querySelector("[data-i18n='resortName']").textContent=l.resortName;document.querySelector("[data-i18n='menuTitle']").textContent=l.menuTitle;document.getElementById("tab-drinks").textContent=l.drinksTab;document.getElementById("tab-food").textContent=l.foodTab}
function renderMenus(){renderPanel(panelDrinks,menuData.drinks[state.lang]);renderPanel(panelFood,menuData.food[state.lang])}
function updateTabVisibility(){panelDrinks.classList.toggle("active",state.tab==="drinks");panelFood.classList.toggle("active",state.tab==="food")}
tabButtons.forEach(function(b){b.addEventListener("click",function(){var t=b.getAttribute("data-tab");if(!t||state.tab===t)return;state.tab=t;tabButtons.forEach(function(x){var a=x.getAttribute("data-tab")===state.tab;x.classList.toggle("active",a)});updateTabVisibility()})});
langButtons.forEach(function(b){b.addEventListener("click",function(){var l=b.getAttribute("data-lang");if(!l||state.lang===l)return;state.lang=l;langButtons.forEach(function(x){x.classList.toggle("active",x.getAttribute("data-lang")===state.lang)});updateLanguageText();renderMenus()})});
updateLanguageText();renderMenus();updateTabVisibility();
</script>
</body>
</html>
